name: 📄 Generate Print PDFs

on:
  # Déclenchement manuel (toujours disponible)
  workflow_dispatch:
    inputs:
      target:
        description: 'Quoi générer'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - roles
          - moments
          - joker
          - affiches
          - livrets
      debug:
        description: 'Mode debug (screenshots + logs)'
        required: false
        default: false
        type: boolean
  
  # Déclenchement auto UNIQUEMENT si le commit contient [print]
  push:
    paths:
      - 'sources/cartes/**/*.md'
      - 'sources/affiches/**/*.html'
      - 'scripts/render-cards.js'
      - 'scripts/assemble-booklets.js'

jobs:
  # Job de vérification : le commit contient-il [print] ?
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      debug_mode: ${{ steps.check.outputs.debug_mode }}
      skip_cards_render: ${{ steps.check.outputs.skip_cards_render }}
      assemble_target: ${{ steps.check.outputs.assemble_target }}
    steps:
      - name: 🔍 Check for [print], [livrets] and [debug] tags
        id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # workflow_dispatch = toujours exécuter
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "✅ Déclenchement manuel - on exécute"

            # Si target='livrets', skip le render des cartes et assemble tout
            if [ "${{ github.event.inputs.target }}" == "livrets" ]; then
              echo "skip_cards_render=true" >> $GITHUB_OUTPUT
              echo "assemble_target=all" >> $GITHUB_OUTPUT
              echo "📚 Mode livrets uniquement - on réassemble tous les livrets"
            else
              echo "skip_cards_render=false" >> $GITHUB_OUTPUT
              echo "assemble_target=${{ github.event.inputs.target }}" >> $GITHUB_OUTPUT
            fi

            # Debug via input
            if [ "${{ github.event.inputs.debug }}" == "true" ]; then
              echo "debug_mode=true" >> $GITHUB_OUTPUT
              echo "🔍 Mode debug activé (input)"
            else
              echo "debug_mode=false" >> $GITHUB_OUTPUT
            fi
          # push = vérifier le message de commit
          elif echo "$COMMIT_MSG" | grep -q "\[print\]"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_cards_render=false" >> $GITHUB_OUTPUT
            echo "assemble_target=all" >> $GITHUB_OUTPUT
            echo "✅ Tag [print] trouvé - on exécute"

            # Debug via tag [debug] dans le commit
            if echo "$COMMIT_MSG" | grep -q "\[debug\]"; then
              echo "debug_mode=true" >> $GITHUB_OUTPUT
              echo "🔍 Mode debug activé (tag)"
            else
              echo "debug_mode=false" >> $GITHUB_OUTPUT
            fi
          elif echo "$COMMIT_MSG" | grep -q "\[livrets\]"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "skip_cards_render=true" >> $GITHUB_OUTPUT
            echo "assemble_target=all" >> $GITHUB_OUTPUT
            echo "✅ Tag [livrets] trouvé - on réassemble tous les livrets uniquement"

            # Debug via tag [debug] dans le commit
            if echo "$COMMIT_MSG" | grep -q "\[debug\]"; then
              echo "debug_mode=true" >> $GITHUB_OUTPUT
              echo "🔍 Mode debug activé (tag)"
            else
              echo "debug_mode=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "skip_cards_render=false" >> $GITHUB_OUTPUT
            echo "assemble_target=all" >> $GITHUB_OUTPUT
            echo "debug_mode=false" >> $GITHUB_OUTPUT
            echo "⏭️ Pas de tag [print] ou [livrets] - on skip"
          fi

  generate-pdfs:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🌐 Install Puppeteer browser
        run: npx puppeteer browsers install chrome
      
      - name: 🖨️ Render A6 cards
        if: needs.check-trigger.outputs.skip_cards_render != 'true'
        run: node scripts/render-cards.js ${{ needs.check-trigger.outputs.assemble_target }}
        env:
          DEBUG: ${{ needs.check-trigger.outputs.debug_mode }}
      
      - name: 📸 Upload debug screenshots
        uses: actions/upload-artifact@v4
        if: needs.check-trigger.outputs.debug_mode == 'true'
        with:
          name: debug-screenshots
          path: print/debug-*.png
          retention-days: 3
          if-no-files-found: ignore
      
      - name: 📚 Assemble booklets
        run: node scripts/assemble-booklets.js ${{ needs.check-trigger.outputs.assemble_target }}

      - name: ✅ Validate PDFs
        run: |
          echo "🔍 Validation des PDFs générés..."
          errors=0
          for pdf in print/cartes/*.pdf print/livrets/*.pdf print/affiches/*.pdf; do
            if [ -f "$pdf" ]; then
              # Vérifier taille > 0
              size=$(stat -c%s "$pdf" 2>/dev/null || stat -f%z "$pdf" 2>/dev/null)
              if [ "$size" -eq 0 ]; then
                echo "❌ $pdf est vide (0 bytes)"
                errors=$((errors + 1))
              # Vérifier header PDF
              elif ! head -c 5 "$pdf" | grep -q '%PDF-'; then
                echo "❌ $pdf n'est pas un PDF valide"
                errors=$((errors + 1))
              else
                echo "✅ $pdf (${size} bytes)"
              fi
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors PDF(s) invalide(s)"
            exit 1
          fi
          echo "✅ Tous les PDFs sont valides"

      - name: 💾 Commit generated PDFs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add print/cartes/*.pdf print/livrets/*.pdf print/affiches/*.pdf assets/images/affiche-*.png || true
          git diff --staged --quiet || git commit -m "📄 Update print PDFs [skip ci]"
          git push || echo "Nothing to push"
